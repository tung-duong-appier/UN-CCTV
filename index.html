<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCTV Footage</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --charcoal: #1a1a1a;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --white: #ffffff;
    --shadow: rgba(0,0,0,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--charcoal);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ─── HEADER ─── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to bottom, rgba(26,26,26,0.95), transparent);
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.5rem;
    letter-spacing: 0.18em;
    color: var(--gold-light);
    text-transform: uppercase;
  }
  header span {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  /* ─── GRID VIEW ─── */
  #grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 50vh 50vh;
    width: 100vw;
    height: 100vh;
    transition: opacity 0.4s;
  }

  .grid-cell {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .grid-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.4s, opacity 0.7s ease;
    filter: brightness(0.82) saturate(0.9);
  }
  .grid-cell.loaded img { opacity: 1; }

  .grid-cell:hover img {
    transform: scale(1.04);
    filter: brightness(0.95) saturate(1.05);
  }

  .cell-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 50%);
    pointer-events: none;
  }

  .cell-label {
    position: absolute;
    bottom: 20px;
    left: 24px;
    color: var(--white);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.85;
    pointer-events: none;
  }

  .cell-number {
    position: absolute;
    top: 72px;
    right: 20px;
    font-size: 0.65rem;
    letter-spacing: 0.22em;
    color: var(--gold-light);
    opacity: 0.6;
    pointer-events: none;
  }

  /* ─── EXPANDED VIEW ─── */
  #expanded {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 50;
    background: var(--charcoal);
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #expanded.active { display: flex; }

  .expanded-inner {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  #expanded-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.88);
  }

  .back-btn {
    position: absolute;
    top: 22px;
    left: 28px;
    z-index: 60;
    background: rgba(26,26,26,0.82);
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 22px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background 0.2s, border-color 0.2s;
  }
  .back-btn:hover {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
  }

  .expanded-title {
    position: absolute;
    bottom: 28px;
    left: 32px;
    color: var(--white);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }

  .expanded-hint {
    position: absolute;
    bottom: 32px;
    right: 32px;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
  }

  /* ─── PERSON HOTSPOTS ─── */
  .person-spot {
    position: absolute;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .person-spot:hover .spot-ring { opacity: 1; transform: scale(1.1); }

  .spot-ring {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    background: rgba(201,168,76,0.12);
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }

  .spot-ring svg { color: var(--gold); }

  .spot-label {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    color: var(--gold-light);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.25s;
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    pointer-events: none;
  }
  .person-spot:hover .spot-label { opacity: 1; }

  /* always-visible pulse */
  .spot-pulse {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1.5px solid rgba(201,168,76,0.5);
    animation: pulse 2.2s infinite;
  }
  @keyframes pulse {
    0%   { transform: scale(1); opacity: 0.7; }
    70%  { transform: scale(1.7); opacity: 0; }
    100% { transform: scale(1.7); opacity: 0; }
  }

  /* ─── EMPLOYEE CARD (POPUP) ─── */
  #card-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
  }
  #card-overlay.active { display: flex; }

  .employee-card {
    position: relative;
    width: 340px;
    background: var(--cream);
    border-top: 4px solid var(--gold);
    padding: 36px 32px 28px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.55);
    animation: cardIn 0.32s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.95); }
    to   { opacity: 1; transform: none; }
  }

  .card-close {
    position: absolute;
    top: 14px; right: 16px;
    background: none;
    border: none;
    font-size: 1.3rem;
    color: rgba(26,26,26,0.45);
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
  }
  .card-close:hover { color: var(--charcoal); }

  .card-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--gold-light);
    margin-bottom: 16px;
    display: block;
    background: #ccc;
  }

  .card-avatar-placeholder {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ddd 0%, #bbb 100%);
    border: 3px solid var(--gold-light);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: #888;
  }

  .card-tag {
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--charcoal);
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .card-role {
    font-size: 0.8rem;
    color: #666;
    margin-bottom: 18px;
    letter-spacing: 0.04em;
  }
  .card-divider {
    height: 1px;
    background: var(--gold-light);
    margin-bottom: 16px;
    opacity: 0.6;
  }
  .card-info {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 0.8rem;
    color: #444;
  }
  .card-row-icon {
    color: var(--gold);
    flex-shrink: 0;
    margin-top: 1px;
    font-size: 0.9rem;
  }
  .card-bio {
    margin-top: 16px;
    font-size: 0.78rem;
    color: #555;
    line-height: 1.65;
    font-style: italic;
    border-left: 2px solid var(--gold-light);
    padding-left: 12px;
  }

  /* ─── LOADING SKELETON (shimmer) ─── */
  @keyframes shimmer {
    0%   { background-position: -420px 0; }
    100% { background-position: 420px 0; }
  }
  .skeleton {
    position: absolute;
    inset: 0;
    z-index: 3;
    background-color: #1f1f1f;
    background-image: linear-gradient(100deg,
      rgba(255,255,255,0)     20%,
      rgba(201,168,76,0.14)   45%,
      rgba(232,213,163,0.20)  55%,
      rgba(255,255,255,0)     80%);
    background-size: 840px 100%;
    background-repeat: no-repeat;
    animation: shimmer 1.5s infinite linear;
    opacity: 1;
    transition: opacity 0.5s ease;
  }
  .grid-cell.loaded .skeleton,
  .expanded-inner.loaded .skeleton {
    opacity: 0;
    pointer-events: none;
  }
  #expanded-img {
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .expanded-inner.loaded #expanded-img { opacity: 1; }

  /* ─── EMPLOYEE CARD FLIP ─── */
  .card-scene {
    position: relative;
    width: min(90vw, 380px);
    max-height: 90vh;
    perspective: 1600px;
  }
  .card-flip {
    position: relative;
    width: 100%;
    aspect-ratio: 1020 / 1077;
    max-height: 90vh;
    transform-style: preserve-3d;
    transform: rotateY(180deg);
    transition: transform 0.85s cubic-bezier(0.34, 1.15, 0.5, 1);
    will-change: transform;
  }
  #card-overlay.active .card-flip.flipped {
    transform: rotateY(0deg);
  }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 2.4% / 2.3%;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  .card-face-front { transform: rotateY(0deg); }
  #card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  /* Back face — UN styled cover shown while the card image loads */
  .card-face-back {
    transform: rotateY(180deg);
    background: linear-gradient(160deg, #2b6cb0 0%, #1a4f8a 55%, #14375f 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    color: #e8eef6;
  }
  .card-back-globe {
    width: 84px; height: 84px;
    opacity: 0.92;
  }
  .card-back-title {
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 0.32em;
    font-size: 1.1rem;
    text-transform: uppercase;
    opacity: 0.95;
  }
  .card-back-sub {
    font-size: 0.62rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: rgba(232,238,246,0.6);
    margin-top: -14px;
  }
  .card-back-loader {
    display: flex;
    gap: 7px;
    margin-top: 6px;
  }
  .card-back-loader span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold-light);
    animation: dotPulse 1.1s infinite ease-in-out;
  }
  .card-back-loader span:nth-child(2) { animation-delay: 0.18s; }
  .card-back-loader span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes dotPulse {
    0%, 80%, 100% { transform: scale(0.5); opacity: 0.35; }
    40%           { transform: scale(1);   opacity: 1; }
  }
  .card-scene .card-close-btn {
    position: absolute;
    top: -16px; right: -16px;
    z-index: 5;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #1a1a1a;
    border: 2px solid #c9a84c;
    color: #e8d5a3;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }
  .card-scene .card-close-btn:hover { transform: scale(1.1); }
</style>
</head>
<body>

<header>
  <h1>CCTV Footage</h1>
</header>

<!-- GRID -->
<div id="grid">
  <!-- Cell 1 -->
  <div class="grid-cell" onclick="openPhoto(0)">
    <div class="skeleton"></div>
    <img src="photos/Entrance.png" alt="Entrance" onload="this.closest('.grid-cell').classList.add('loaded')">
    <div class="cell-overlay"></div>
    <span class="cell-number">01 / 04</span>
    <span class="cell-label">Entrance</span>
  </div>
  <!-- Cell 2 -->
  <div class="grid-cell" onclick="openPhoto(1)">
    <div class="skeleton"></div>
    <img src="photos/Hallway.png" alt="Hallway" onload="this.closest('.grid-cell').classList.add('loaded')">
    <div class="cell-overlay"></div>
    <span class="cell-number">02 / 04</span>
    <span class="cell-label">Hallway</span>
  </div>
  <!-- Cell 3 -->
  <div class="grid-cell" onclick="openPhoto(2)">
    <div class="skeleton"></div>
    <img src="photos/Lobby.png" alt="Lobby" onload="this.closest('.grid-cell').classList.add('loaded')">
    <div class="cell-overlay"></div>
    <span class="cell-number">03 / 04</span>
    <span class="cell-label">Lobby</span>
  </div>
  <!-- Cell 4 -->
  <div class="grid-cell" onclick="openPhoto(3)">
    <div class="skeleton"></div>
    <img src="photos/Office.png" alt="Office" onload="this.closest('.grid-cell').classList.add('loaded')">
    <div class="cell-overlay"></div>
    <span class="cell-number">04 / 04</span>
    <span class="cell-label">Office</span>
  </div>
</div>

<!-- EXPANDED PHOTO VIEW -->
<div id="expanded">
  <div class="expanded-inner" id="expanded-inner">
    <div class="skeleton"></div>
    <button class="back-btn" onclick="closePhoto()">← Quay lại</button>
    <img id="expanded-img" src="" alt="">
    <div id="person-spots"></div>
    <div class="expanded-title" id="expanded-title"></div>
    <div class="expanded-hint">Click vào người để xem thẻ nhân viên</div>
  </div>
</div>

<div id="card-overlay" onclick="closeCard(event)">
  <div class="card-scene">
    <div class="card-flip" id="card-flip">
      <!-- BACK (shown first, doubles as loader) -->
      <div class="card-face card-face-back">
        <svg class="card-back-globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8">
          <circle cx="12" cy="12" r="10"/>
          <ellipse cx="12" cy="12" rx="4.5" ry="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M3.5 7 H20.5 M3.5 17 H20.5"/>
        </svg>
        <div>
          <div class="card-back-title">United Nations</div>
          <div class="card-back-sub">Staff Identity</div>
        </div>
        <div class="card-back-loader"><span></span><span></span><span></span></div>
      </div>
      <!-- FRONT (the employee card image) -->
      <div class="card-face card-face-front">
        <img id="card-img" src="" alt="Employee card">
      </div>
    </div>
    <button class="card-close-btn" onclick="closeCard()">✕</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  DỮ LIỆU — Chỉnh sửa tại đây
// ════════════════════════════════════════════════════════════
const photos = [
  {
    src: "photos/Entrance.png",
    title: "Entrance",
    people: [
      { left: 43.5, top: 46,   name: "David",    cardSrc: "cards/David Mwangi.png" },
      { left: 51.5, top: 76.5, name: "Maya",     cardSrc: "cards/Maya Rahman.png" },
      { left: 49,   top: 42,   name: "Naomi",    cardSrc: "cards/Naomi Okafor.png" },
      { left: 59,   top: 46,   name: "Karim",    cardSrc: "cards/Karim El-Sayed.png" },
      { left: 82,   top: 63,   name: "Adrian",   cardSrc: "cards/Adrian Santos.png" }
    ]
  },
  {
    src: "photos/Hallway.png",
    title: "Hallway",
    people: [
      { left: 22.5, top: 50, name: "Lindiwe",  cardSrc: "cards/Lindiwe Maseko.png" },
      { left: 42,   top: 50, name: "Samuel",   cardSrc: "cards/Samuel Dlamini.png" },
      { left: 50,   top: 49, name: "Tesfaye",  cardSrc: "cards/Tesfaye Alemu.png" },
      { left: 60,   top: 48, name: "Daniel",   cardSrc: "cards/Daniel Bekele.png" },
      { left: 81.5, top: 49, name: "Idriss",   cardSrc: "cards/Idriss Nkurunziza.png" }
    ]
  },
  {
    src: "photos/Lobby.png",
    title: "Lobby",
    people: [
      { left: 28,   top: 71,   name: "Amina",   cardSrc: "cards/Amina Diop.png" },
      { left: 35.5, top: 74,   name: "Chipo",   cardSrc: "cards/Chipo Ndlovu.png" },
      { left: 55,   top: 74,   name: "Jean",    cardSrc: "cards/Jean-Paul Habimana.png" },
      { left: 67.5, top: 72.5, name: "Keikou",  cardSrc: "cards/Keiko Matsuda.png" },
      { left: 65,   top: 57,   name: "Malik",   cardSrc: "cards/Malik Kamara.png" }
    ]
  },
  {
    src: "photos/Office.png",
    title: "Office",
    people: [
      { left: 18.5, top: 42,   name: "Rohan",    cardSrc: "cards/Rohan Perera.png" },
      { left: 31.5, top: 55.5, name: "Thierry",  cardSrc: "cards/Thierry Mukendi.png" },
      { left: 35.5, top: 39,   name: "Abdul",    cardSrc: "cards/Abdullahi Noor.png" },
      { left: 41,   top: 41,   name: "Youssouf", cardSrc: "cards/Youssouf Aden.png" },
      { left: 49.5, top: 41,   name: "Fatou",    cardSrc: "cards/Fatou Bensouda.png" }
    ]
  }
];

// ════════════════════════════════════════════════════════════
//  LOGIC
// ════════════════════════════════════════════════════════════
let currentPhoto = null;

function openPhoto(index) {
  currentPhoto = index;
  const p = photos[index];

  // Loading overlay: hide shimmer only once the big photo is ready
  const inner = document.getElementById('expanded-inner');
  const expImg = document.getElementById('expanded-img');
  inner.classList.remove('loaded');
  expImg.onload = () => inner.classList.add('loaded');
  expImg.src = p.src;
  if (expImg.complete) inner.classList.add('loaded');
  document.getElementById('expanded-title').textContent = p.title;

  // Build hotspots
  const container = document.getElementById('person-spots');
  container.innerHTML = '';
  p.people.forEach((person, i) => {
    const spot = document.createElement('div');
    spot.className = 'person-spot';
    spot.style.left = person.left + '%';
    spot.style.top  = person.top  + '%';
    spot.style.transform = 'translate(-50%, -50%)';
    spot.innerHTML = `
      <div class="spot-ring">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <div class="spot-pulse"></div>
      <div class="spot-label">${person.name.split(' ').pop()}</div>
    `;
    spot.addEventListener('click', (e) => { e.stopPropagation(); openCard(index, i); });
    container.appendChild(spot);
  });

  document.getElementById('expanded').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closePhoto() {
  document.getElementById('expanded').classList.remove('active');
}

function openCard(photoIndex, personIndex) {
  const p = photos[photoIndex].people[personIndex];
  const overlay = document.getElementById('card-overlay');
  const flip = document.getElementById('card-flip');
  const img = document.getElementById('card-img');

  // Reset to the back face (also acts as the loading state)
  flip.classList.remove('flipped');
  overlay.classList.add('active');

  const openedAt = Date.now();
  const revealFront = () => {
    // Keep the back visible for a beat so the flip always reads nicely
    const wait = Math.max(0, 550 - (Date.now() - openedAt));
    setTimeout(() => flip.classList.add('flipped'), wait);
  };

  img.onload = revealFront;
  img.onerror = revealFront; // still flip even if the image is missing
  img.src = p.cardSrc;
  if (img.complete && img.naturalWidth) revealFront();
}

function closeCard(e) {
  if (!e || e.target === document.getElementById('card-overlay')) {
    const flip = document.getElementById('card-flip');
    flip.classList.remove('flipped');
    document.getElementById('card-overlay').classList.remove('active');
  }
}

// ESC key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('card-overlay').classList.contains('active')) closeCard();
    else if (document.getElementById('expanded').classList.contains('active')) closePhoto();
  }
});
</script>
</body>
</html>
